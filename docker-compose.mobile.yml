name: todo_mobile
services:
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile.dev
    container_name: todo_mobile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://api:4000/api}
      EXPO_PUBLIC_API_URL_HOST: ${EXPO_PUBLIC_API_URL_HOST:-http://localhost:4000/api}
      EXPO_DEVTOOLS_PORT: ${EXPO_DEVTOOLS_PORT:-19002}
      EXPO_METRO_PORT: ${EXPO_METRO_PORT:-8081}
      EXPO_WEB_PORT: ${EXPO_WEB_PORT:-19006}
    ports:
      - "19000:19000"
      - "19001:19001"
      - "${EXPO_DEVTOOLS_PORT:-19002}:19002"
      - "${EXPO_METRO_PORT:-8081}:8081"
      - "${EXPO_WEB_PORT:-19006}:19006"
    command: sh -c "npm install && npx expo start --host 0.0.0.0 --lan --non-interactive"
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    depends_on:
      - android_emulator
    networks:
      - mobile_backend_net

  android_emulator:
    image: budtmo/docker-android:emulator_13.0
    container_name: todo_android_emulator
    restart: unless-stopped
    privileged: true
    shm_size: 2gb
    environment:
      DEVICE: ${ANDROID_EMULATOR_DEVICE:-Samsung Galaxy S10}
      EMULATOR_ARGS: -gpu swiftshader_indirect -noaudio -no-boot-anim
      WEB_VNC: true
      APPIUM: false
    ports:
      - "6080:6080"
      - "5554:5554"
      - "5555:5555"
    networks:
      - mobile_backend_net

volumes:
  mobile_node_modules:

networks:
  mobile_backend_net:
    external: true
