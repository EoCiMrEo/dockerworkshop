services:
  db:
    image: postgres:16-alpine
    container_name: todo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tododb}
      POSTGRES_USER: ${POSTGRES_USER:-todouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todopassword}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todouser} -d ${POSTGRES_DB:-tododb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: todo_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgres://todouser:todopassword@db:5432/tododb}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev-access-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev-refresh-secret}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm run migrate && npm run dev"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - backend_net
      - frontend_backend_net
      - mobile_backend_net

volumes:
  db_data:
  backend_node_modules:

networks:
  backend_net:
    external: true
  frontend_backend_net:
    external: true
  mobile_backend_net:
    external: true
